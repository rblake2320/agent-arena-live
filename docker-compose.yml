name: agent-arena

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: arena
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env or the environment}
      POSTGRES_DB: agent_arena
    ports:
      # Host port 55433 to avoid clashing with other local Postgres instances
      - "127.0.0.1:55433:5432"
    volumes:
      - arena_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U arena -d agent_arena"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: "3001"
      HOST: 0.0.0.0
      DATABASE_URL: postgresql://arena:${POSTGRES_PASSWORD}@db:5432/agent_arena
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET (openssl rand -hex 32)}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8088}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3001:3001"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8088:80"

volumes:
  arena_pgdata:
