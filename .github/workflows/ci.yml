name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsc -p tsconfig.app.json --noEmit
      - run: npm run build
        env:
          VITE_API_URL: ""

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: arena
          POSTGRES_PASSWORD: ci_password
          POSTGRES_DB: agent_arena
        ports:
          - 55433:5432
        options: >-
          --health-cmd "pg_isready -U arena -d agent_arena"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://arena:ci_password@localhost:55433/agent_arena
      JWT_SECRET: ci-only-jwt-secret-not-used-in-production-0000
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - name: Apply migrations to test database
        run: npm run db:migrate
      - run: npm test
